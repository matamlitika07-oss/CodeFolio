kind = "web"
previewPath = "/"
title = "CodeFolio"
version = "1.0.0"
id = "artifacts/codefolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22096

[services.development]
run = "pnpm --filter @workspace/codefolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codefolio", "run", "build" ]
publicDir = "artifacts/codefolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22096"
BASE_PATH = "/"
